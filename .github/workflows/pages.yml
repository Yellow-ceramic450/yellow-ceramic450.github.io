name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AC2308: ${{ secrets.AC2308 }}
          BEF9A2: ${{ secrets.BEF9A2 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AC2308', '')
          bm = os.environ.get('BEF9A2', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 1593bf7a76e9b0b24a295e47902502 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 19a47a27c60c85a0eb4b825f -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
