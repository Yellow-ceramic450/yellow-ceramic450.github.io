mainSections   = ["post"]
rssFullContent = true
favicon        = "/favicon.png"
description    = "记录galgame、技术折腾与生活杂记的个人博客"

[footer]
    since = 2026

[sidebar]
    emoji    = "🐾"
    subtitle = "galgame"
    avatar   = "/img/avatar.png"

[opengraph]
    [opengraph.twitter]
        site = "catmoimoi"
        card = "summary_large_image"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled  = true
    provider = "waline"

    [comments.waline]
        serverURL    = "https://comments.catmoimoi.ccwu.cc"
        lang         = "zh"
        pageview     = true
        emoji        = ["https://unpkg.com/@waline/emojis@1.0.1/weibo"]
        requiredMeta = ["name"]

        [comments.waline.locale]
            admin       = "博主"
            placeholder = "写下你的评论..."

[cookies]
    enabled = false
